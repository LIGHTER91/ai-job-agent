name: Daily job agent

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate jobs JSON
        run: python -m agent.main
        env:
          ENABLE_REMOTIVE: "true"
          JOB_AGENT_MAX_RESULTS: "30"

      - name: Commit generated data if changed
        run: |
          if git diff --quiet -- web/public/data/jobs.json; then
            echo "No job data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/jobs.json
          git commit -m "chore(agent): refresh analyzed jobs"
          git push
